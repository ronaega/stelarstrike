# Generic pattern: Django REST Framework API
# Matches ANY DRF-based API, not any specific target.

name: "Django REST Framework API"
description: >
  Generic pattern for Django REST Framework (DRF) APIs.
  Common in enterprise apps and course labs. Uses PostgreSQL or MySQL.
  Identified by CSRF cookie, DRF browsable API responses, or Django error pages.

fingerprints:
  - header_contains: "csrftoken"
  - response_contains: "Django REST framework"
  - response_contains: "django"
  - header_contains: "django"

probe_endpoints:
  - path: "/api/token/"
    method: "POST"
    body_types: ["json", "form"]
    injectable_fields: ["username", "password"]
  - path: "/api/auth/login/"
    method: "POST"
    body_types: ["json", "form"]
  - path: "/api/users/"
    method: "GET"
  - path: "/api/login/"
    method: "POST"
    body_types: ["json", "form"]
  - path: "/admin/"
    method: "GET"
  - path: "/api/v1/login/"
    method: "POST"
    body_types: ["json", "form"]

sqli:
  likely_db: "postgresql"
  try_positions_first: [0, 1, 2]
  col_count_hint: 6

extra_checks:
  - name: "Django Debug Page (DEBUG=True)"
    indicator: "You're seeing this error because you have DEBUG = True"
    severity: "high"
  - name: "Django Admin Exposed"
    path: "/admin/"
    indicator: "Django administration"
    severity: "medium"
