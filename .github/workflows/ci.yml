name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check assets tests

      - name: Type check (mypy)
        run: mypy assets --ignore-missing-imports || true

      - name: Run unit tests
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t stelarstrike:ci .
      - name: Sanity check container
        run: docker run --rm stelarstrike:ci plugins
