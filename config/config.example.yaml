# ==========================================================
# StelarStrike main configuration
# Copy to config/config.yaml and edit.
# Values here can reference environment variables using ${VAR_NAME}.
# Anything set in .env overrides the defaults below.
# ==========================================================

project:
  name: "StelarStrike"
  report_dir: "${STELAR_REPORT_DIR:-reports}"
  log_level: "${STELAR_LOG_LEVEL:-INFO}"

engagement:
  # Freeform label shown in generated reports
  name: "example-engagement"
  # Only targets matching one of these patterns may be scanned.
  # Required when STELAR_REQUIRE_SCOPE_FILE=true
  scope:
    - "https://target.example.com/*"
    - "*.staging.example.com"
  out_of_scope:
    - "https://target.example.com/admin/*"
  allow_active_payloads: "${STELAR_ALLOW_ACTIVE_PAYLOADS:-false}"

# Auto-discovery: when the target URL you pass to `scan` has no query
# string, StelarStrike crawls same-origin links/forms one level deep to
# find parametrized URLs for plugins like sqli/nosqli/idor/ssrf to test.
# If nothing parametrized is found, it falls back to guessing a small
# set of common parameter names against the original URL.
# Disable this if you want to scan EXACTLY the URL you passed, nothing else.
discovery:
  enabled: true
  max_urls: 10
  max_depth: 1
  synthetic_params: ["id", "page", "category", "search", "q", "user_id"]

http:
  timeout_seconds: "${STELAR_TIMEOUT_SECONDS:-15}"
  max_concurrency: "${STELAR_MAX_CONCURRENCY:-10}"
  user_agent: "${STELAR_USER_AGENT}"
  follow_redirects: true
  verify_tls: true
  extra_headers:
    X-Scanned-By: "StelarStrike"

# Toggle vulnerability plugins on/off and tune each one individually.
# Plugin IDs must match the "id" attribute on each plugin class in
# stelarstrike/plugins/.
plugins:
  sqli:
    enabled: true
    # Big Pickle methodology: error-based → auth bypass → UNION col count → reflect → extract
    # Data extraction runs automatically when engagement.allow_active_payloads is true.
    max_tables: 10        # max tables to enumerate columns for
  nosqli:
    enabled: true
    dbms_hints: ["mongodb"]
  xss:
    enabled: true
    contexts: ["reflected", "stored", "dom"]
  ssrf:
    enabled: true
    collaborator_url: ""   # optional out-of-band callback host (e.g. Interactsh)
  csrf:
    enabled: true
    check_samesite: true
  file_upload:
    enabled: true
    test_extensions: [".php", ".php5", ".phtml", ".svg", ".jsp", ".asp"]
  idor:
    enabled: true
    id_param_hints: ["id", "user_id", "uid", "account", "order_id"]
  jwt:
    enabled: true
    checks: ["alg-none", "weak-secret", "kid-injection", "expired-token-reuse"]

ai:
  # AI backend: OpenCode (https://opencode.ai).
  # Install once with: curl -fsSL https://opencode.ai/install | bash
  # Default model: opencode/big-pickle (the Big Pickle model used for scan analysis).
  # Change OPENCODE_MODEL in .env to switch models; run `opencode models` to list available ones.
  enabled: "${STELAR_AI_ENABLED:-true}"
  provider: "${OPENCODE_MODEL:-opencode/big-pickle}"
  max_tokens: "${STELAR_AI_MAX_TOKENS:-2000}"
  roles:
    triage: true
    report_writer: true
    sqli_agent: true

reporting:
  formats: ["markdown", "json"]
  include_raw_evidence: true
  redact_secrets: true

notifications:
  slack_webhook_url: "${STELAR_SLACK_WEBHOOK_URL:-}"
  discord_webhook_url: "${STELAR_DISCORD_WEBHOOK_URL:-}"
  notify_on: ["scan_complete", "critical_finding"]
